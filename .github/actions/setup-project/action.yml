name: Setup project
description: Checkout repository, setup Node.js, and install dependencies

runs:
  using: composite
  steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: "22"
        cache: "npm"

    - name: Install dependencies
      run: npm ci
      shell: bash
